<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>4U Delivery | دخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="login.css">
</head>

<body class="page-body">
    <!-- Page Transition Curtain -->
    <div class="page-transition-curtain"></div>

    <!-- BG Effects -->
    <div class="bg-effects pointer-events-none">
        <div class="particles"></div>
        <div class="glow-brand animate-float"></div>
        <div class="glow-gold animate-float" style="animation-delay: -3s;"></div>
        <div class="bg-gradient-overlay"></div>
    </div>

    <!-- Main Container -->
    <div class="auth-container" id="auth-container">
        <!-- Logo -->
        <a href="../_3/home.html" class="logo-link group stagger-1">
            <div class="logo-wrapper">
                <div class="logo-icon group-hover-scale">4U</div>
                <span class="logo-text group-hover-text-gold">Delivery</span>
            </div>
            <p class="logo-subtitle">Premium Delivery Service</p>
        </a>

        <!-- LOGIN FORM -->
        <div class="auth-card glass glow-red animate-scale-in" id="login-screen">
            <h2 class="auth-title stagger-2">أهلاً بيك</h2>
            <p class="auth-subtitle stagger-3">سجل دخولك وابدأ اطلب</p>

            <form class="auth-form" id="loginForm">
                <div class="form-group stagger-4">
                    <label class="form-label">الإيميل</label>
                    <div class="input-wrapper">
                        <input type="email" id="loginEmail" placeholder="example@mail.com" class="form-input"
                            required />
                        <span class="material-symbols-outlined input-icon">person</span>
                    </div>
                </div>
                <div class="form-group stagger-4" style="animation-delay: 0.5s;">
                    <label class="form-label">كلمة السر</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" placeholder="••••••••" class="form-input" required />
                        <span class="material-symbols-outlined input-icon">lock</span>
                        <span class="material-symbols-outlined password-toggle" onclick="togglePasswordVisibility('loginPassword', this)">visibility_off</span>
                    </div>
                    <div class="forgot-password">
                        <a href="../_7/contact.html" class="link-brand">نسيت كلمة السر؟</a>
                    </div>
                </div>
                <button type="submit" class="btn-primary stagger-5 ripple-btn">
                    دخول
                </button>
            </form>

            <div class="auth-footer stagger-5">
                <p class="auth-footer-text">
                    معندكش حساب؟
                    <button class="link-gold" onclick="toggleAuth('register')" type="button">اعمل حساب جديد</button>
                </p>
            </div>
        </div>

        <!-- REGISTER FORM -->
        <div class="auth-card glass glow-red hidden animate-scale-in" id="register-screen">
            <h2 class="auth-title stagger-2">اعمل حساب جديد </h2>
            <p class="auth-subtitle stagger-3">سجل معانا وابدأ تجمع نقاطك</p>

            <form class="auth-form" id="registerForm">
                <div class="form-group stagger-4">
                    <label class="form-label">الاسم بالكامل</label>
                    <div class="input-wrapper">
                        <input type="text" id="registerName" placeholder="اسمك إيه؟" class="form-input" required />
                        <span class="material-symbols-outlined input-icon">badge</span>
                    </div>
                </div>
                <div class="form-group stagger-4">
                    <label class="form-label">رقم الموبايل</label>
                    <div class="input-wrapper">
                        <input type="tel" id="registerPhone" placeholder="01xxxxxxxxx" class="form-input" required />
                        <span class="material-symbols-outlined input-icon">call</span>
                    </div>
                </div>
                <div class="form-group stagger-4">
                    <label class="form-label">الإيميل</label>
                    <div class="input-wrapper">
                        <input type="email" id="registerEmail" placeholder="example@mail.com" class="form-input" required />
                        <span class="material-symbols-outlined input-icon">mail</span>
                    </div>
                </div>
                <div class="form-grid stagger-4">
                    <div class="form-group">
                        <label class="form-label">كلمة السر</label>
                        <div class="input-wrapper">
                            <input type="password" id="registerPassword" placeholder="••••••••" class="form-input" required />
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <span class="material-symbols-outlined password-toggle" onclick="togglePasswordVisibility('registerPassword', this)">visibility_off</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">تأكيد كلمة السر</label>
                        <div class="input-wrapper">
                            <input type="password" id="registerConfirm" placeholder="••••••••" class="form-input" required />
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <span class="material-symbols-outlined password-toggle" onclick="togglePasswordVisibility('registerConfirm', this)">visibility_off</span>
                        </div>
                    </div>
                </div>
                <label class="checkbox-wrapper stagger-5">
                    <input type="checkbox" class="form-checkbox" />
                    <span class="checkbox-label">أنا موافق على الشروط والأحكام</span>
                </label>
                <button type="submit" class="btn-primary stagger-5 ripple-btn">
                    تسجيل
                </button>
            </form>

            <div class="auth-footer stagger-5">
                <p class="auth-footer-text">
                    عندك حساب فعلاً؟
                    <button class="link-gold" onclick="toggleAuth('login')" type="button">سجل دخولك</button>
                </p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="page-footer stagger-5">
        <p class="footer-text">© 2026 4U Delivery</p>
        <a href="../_7/terms.html" class="footer-link">الشروط والأحكام</a>
    </footer>

    <script type="module" src="login.js"></script>
</body>

</html>
