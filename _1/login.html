<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>4U Delivery | دخول</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{ brand:{DEFAULT:'#c8102e',light:'#ff4757',dark:'#8b0000'}, gold:{DEFAULT:'#f0c040',light:'#ffe085'}, dark:{50:'#f5f5f5',100:'#e0e0e0',200:'#bdbdbd',300:'#9e9e9e',400:'#757575',500:'#616161',600:'#424242',700:'#303030',800:'#1a1a1a',900:'#0d0d0d',950:'#080808'}}, fontFamily:{cairo:['Cairo','sans-serif']} }}}
    </script>
    <style>
        * { margin:0;padding:0;box-sizing:border-box }
        body { font-family:'Cairo',sans-serif; background:#080808; color:#e0e0e0; overflow-x:hidden; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .glass { background:rgba(26,26,26,0.7); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.06); }
        .glow-red { box-shadow:0 0 80px rgba(200,16,46,0.1), 0 0 160px rgba(200,16,46,0.05); }
        @keyframes slide-up { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .animate-slide-up { animation:slide-up 0.6s ease-out forwards; }
        .animate-float { animation:float 6s ease-in-out infinite; }
        .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
        input:focus { outline:none; }
    </style>
</head>
<body class="relative p-4 md:p-8">

    <!-- BG Effects -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-[-200px] right-[-200px] w-[600px] h-[600px] bg-brand/8 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-200px] left-[-200px] w-[500px] h-[500px] bg-gold/4 rounded-full blur-[100px]"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_30%,rgba(200,16,46,0.06),transparent_50%)]"></div>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-[440px] relative z-10 animate-slide-up" id="auth-container">
        <!-- Logo -->
        <a href="../_3/home.html" class="text-center mb-10 block group">
            <div class="flex items-center justify-center gap-3 mb-2">
                <div class="w-12 h-12 rounded-xl bg-brand flex items-center justify-center text-white font-black text-xl group-hover:scale-110 transition-transform">4U</div>
                <span class="text-3xl font-black text-white group-hover:text-gold transition-colors">Delivery</span>
            </div>
            <p class="text-dark-500 text-xs font-semibold tracking-[0.2em] uppercase">Premium Delivery Service</p>
        </a>

        <!-- LOGIN FORM -->
        <div class="glass rounded-3xl p-8 glow-red" id="login-screen">
            <h2 class="text-2xl font-black text-white mb-1">أهلاً بيك 👋</h2>
            <p class="text-dark-400 text-sm mb-8">سجل دخولك وابدأ اطلب</p>
            
            <form class="space-y-5" onsubmit="event.preventDefault();">
                <div>
                    <label class="text-dark-300 text-xs font-bold block mb-2">الإيميل أو رقم الموبايل</label>
                    <div class="relative">
                        <input type="text" placeholder="ادخل بياناتك هنا..." class="w-full bg-dark-800 border border-dark-600 rounded-xl px-4 py-3.5 text-white placeholder:text-dark-500 focus:border-brand focus:ring-1 focus:ring-brand/30 transition-all text-right"/>
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-dark-500 text-xl">person</span>
                    </div>
                </div>
                <div>
                    <label class="text-dark-300 text-xs font-bold block mb-2">كلمة السر</label>
                    <div class="relative">
                        <input type="password" placeholder="••••••••" class="w-full bg-dark-800 border border-dark-600 rounded-xl px-4 py-3.5 text-white placeholder:text-dark-500 focus:border-brand focus:ring-1 focus:ring-brand/30 transition-all text-right"/>
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-dark-500 text-xl">lock</span>
                    </div>
                    <div class="text-left mt-2">
                        <a href="#" class="text-brand text-xs font-semibold hover:underline">نسيت كلمة السر؟</a>
                    </div>
                </div>
                <button onclick="window.location.href='../_2/profile.html'" class="w-full bg-brand hover:bg-brand-light text-white py-4 rounded-xl font-bold text-lg transition-all hover:shadow-xl hover:shadow-brand/20 active:scale-[0.98]">
                    دخول
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <p class="text-dark-400 text-sm">
                    معندكش حساب؟
                    <button class="text-gold font-bold hover:underline mr-1" onclick="toggleAuth('register')">اعمل حساب جديد</button>
                </p>
            </div>
        </div>

        <!-- REGISTER FORM -->
        <div class="glass rounded-3xl p-8 glow-red hidden" id="register-screen">
            <h2 class="text-2xl font-black text-white mb-1">اعمل حساب جديد </h2>
            <p class="text-dark-400 text-sm mb-8">سجل معانا وابدأ تجمع نقاطك</p>
            
            <form class="space-y-4" onsubmit="event.preventDefault();">
                <div>
                    <label class="text-dark-300 text-xs font-bold block mb-2">الاسم بالكامل</label>
                    <input type="text" placeholder="اسمك إيه؟" class="w-full bg-dark-800 border border-dark-600 rounded-xl px-4 py-3.5 text-white placeholder:text-dark-500 focus:border-brand focus:ring-1 focus:ring-brand/30 transition-all text-right"/>
                </div>
                <div>
                    <label class="text-dark-300 text-xs font-bold block mb-2">رقم الموبايل</label>
                    <input type="tel" placeholder="01xxxxxxxxx" class="w-full bg-dark-800 border border-dark-600 rounded-xl px-4 py-3.5 text-white placeholder:text-dark-500 focus:border-brand focus:ring-1 focus:ring-brand/30 transition-all text-right"/>
                </div>
                <div>
                    <label class="text-dark-300 text-xs font-bold block mb-2">الإيميل</label>
                    <input type="email" placeholder="example@mail.com" class="w-full bg-dark-800 border border-dark-600 rounded-xl px-4 py-3.5 text-white placeholder:text-dark-500 focus:border-brand focus:ring-1 focus:ring-brand/30 transition-all text-right"/>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-dark-300 text-xs font-bold block mb-2">كلمة السر</label>
                        <input type="password" placeholder="••••••••" class="w-full bg-dark-800 border border-dark-600 rounded-xl px-4 py-3.5 text-white placeholder:text-dark-500 focus:border-brand focus:ring-1 focus:ring-brand/30 transition-all text-right"/>
                    </div>
                    <div>
                        <label class="text-dark-300 text-xs font-bold block mb-2">تأكيد كلمة السر</label>
                        <input type="password" placeholder="••••••••" class="w-full bg-dark-800 border border-dark-600 rounded-xl px-4 py-3.5 text-white placeholder:text-dark-500 focus:border-brand focus:ring-1 focus:ring-brand/30 transition-all text-right"/>
                    </div>
                </div>
                <label class="flex items-center gap-2 pt-1 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded bg-dark-800 border-dark-600 text-brand focus:ring-brand/30"/>
                    <span class="text-dark-400 text-xs">أنا موافق على الشروط والأحكام</span>
                </label>
                <button onclick="window.location.href='../_2/profile.html'" class="w-full bg-brand hover:bg-brand-light text-white py-4 rounded-xl font-bold text-lg transition-all hover:shadow-xl hover:shadow-brand/20 active:scale-[0.98]">
                    تسجيل
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <p class="text-dark-400 text-sm">
                    عندك حساب فعلاً؟
                    <button class="text-gold font-bold hover:underline mr-1" onclick="toggleAuth('login')">سجل دخولك</button>
                </p>
            </div>
        </div>

        <!-- Social Auth -->
        <div class="mt-6 text-center">
            <span class="text-dark-500 text-xs">أو سجل عن طريق</span>
            <div class="flex justify-center gap-4 mt-4">
                <button class="w-12 h-12 rounded-xl glass flex items-center justify-center hover:bg-dark-700 transition-all hover:scale-110">
                    <img class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYBf8hUMexKdG5clw-5OnQzq__G5LNOGdX30euXVcX1H4y3XnXJsZkn5n24Z1xuf6Vzf4Fm_jH3RA2iKLJVHQJNszHuzJZJJATI9Yt8A5PnMAdmOMjN22mvRhko-stFeK5pWKA9eNm895fxPkz43C1Z--TQ0bLvZ8CRicyTO53urp70cp71jojEGSaMD9IosASX5RRzDupWWbKLs-vUhGRwBeVFrnanSGmqb0MwgdJPhVgggvaQNW2" alt="Google"/>
                </button>
                <button class="w-12 h-12 rounded-xl glass flex items-center justify-center hover:bg-dark-700 transition-all hover:scale-110">
                    <img class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvOUAm9tUZUMYREHv943bOstexAuN6GrI8rYt_grD2gmFld0CjQqU-uRPLOWQ9ab7e09Uf_CbOUORvnYVjccTAbxn4UvNyOZTlCyh0sy2-WehTSjkYZQH2-E9FleFyGrzzqPQ4if85CBzL8VilDdOTGQTytrQi5PR9fe3P35JzMHmGLnSRAX67ql64d3yuTE83NJUXcJh_KTezZ0NQsrRhcY5WNCPJUHQzcvlItfwNh6SPWjRuSjn1" alt="Apple"/>
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="fixed bottom-0 w-full py-3 px-6 flex justify-between items-center z-50">
        <p class="text-dark-600 text-xs">© 2026 4U Delivery</p>
        <a href="#" class="text-dark-600 text-xs hover:text-brand transition-colors">الشروط والأحكام</a>
    </footer>

    <script>
        function toggleAuth(type) {
            const login = document.getElementById('login-screen');
            const register = document.getElementById('register-screen');
            const container = document.getElementById('auth-container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(10px)';
            container.style.transition = 'all 0.3s ease';
            setTimeout(() => {
                if (type === 'register') { login.classList.add('hidden'); register.classList.remove('hidden'); document.title = "4U Delivery | حساب جديد"; }
                else { register.classList.add('hidden'); login.classList.remove('hidden'); document.title = "4U Delivery | دخول"; }
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 300);
        }
        document.addEventListener('DOMContentLoaded', () => {
            const tab = localStorage.getItem('authTab');
            if (tab === 'register') toggleAuth('register');
        });
        document.addEventListener('mousemove', (e) => {
            const glows = document.querySelectorAll('.fixed > div');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
        });
    </script>
</body>
</html>
