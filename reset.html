<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تصفير قاعدة البيانات</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background: #111; color: #fff;">
    <div id="container">
        <h1 style="color: #f44336;">⚠️ تحذير خطير ⚠️</h1>
        <p>هذا الإجراء سيقوم بمسح جميع نقاط وأختام العملاء وسجل نشاطاتهم بالكامل. لا يمكن التراجع عن هذه الخطوة!</p>
        <button id="start-btn" style="background: #f44336; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px;">
            نعم، قم بتصفير كل شيء الآن
        </button>
    </div>
    <h2 id="status" style="margin-top: 30px;"></h2>
    
    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.getElementById('start-btn').addEventListener('click', async () => {
            const confirmAction = confirm("هل أنت متأكد بنسبة 100% أنك تريد مسح كل شيء؟");
            if (!confirmAction) return;

            const statusEl = document.getElementById("status");
            const btn = document.getElementById("start-btn");
            
            btn.disabled = true;
            btn.style.opacity = "0.5";
            statusEl.innerHTML = "جاري تصفير النقاط والأختام لجميع العملاء... برجاء الانتظار...";
            statusEl.style.color = "#fff";

            try {
                // 1. Reset all users
                const usersSnap = await getDocs(collection(db, "users"));
                for (const d of usersSnap.docs) {
                    await updateDoc(doc(db, "users", d.id), {
                        points: 0,
                        stamps: {},
                        tier: "Silver"
                    });
                }

                // 2. Clear all activities
                const actsSnap = await getDocs(collection(db, "activities"));
                for (const d of actsSnap.docs) {
                    await deleteDoc(doc(db, "activities", d.id));
                }

                statusEl.innerHTML = "✅ تم تصفير جميع الأختام، النقاط، ومسح سجل النشاطات بنجاح!<br><br>يمكنك إغلاق هذه الصفحة الآن.";
                statusEl.style.color = "#4CAF50";
            } catch (error) {
                console.error("Error resetting data:", error);
                statusEl.innerHTML = "❌ حدث خطأ أثناء التصفير، يرجى مراجعة الـ Console.";
                statusEl.style.color = "#f44336";
            }
        });
    </script>
</body>
</html>
