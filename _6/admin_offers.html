<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>4U Delivery | إدارة العروض</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="stamps.css">
    <style>
        .input-control option {
            background-color: var(--dark-900);
            color: white;
        }
        .offers-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .offer-card {
            border-radius: 1rem;
            padding: 1.5rem;
            position: relative;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow: hidden;
        }
        .offer-brand {
            background: linear-gradient(135deg, var(--brand), #800015);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .offer-gold {
            background: linear-gradient(135deg, #111, #222);
            border: 1px solid var(--gold);
        }
        .offer-gold .offer-title { color: var(--gold); }
        
        .offer-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            align-self: flex-start;
            backdrop-filter: blur(5px);
        }
        .offer-title { font-weight: bold; font-size: 1.25rem; margin-top: 0.5rem; }
        .offer-desc { font-size: 0.9rem; opacity: 0.9; }
        .offer-icon-bg {
            position: absolute;
            bottom: -20px;
            left: -10px;
            font-size: 8rem;
            opacity: 0.1;
            transform: rotate(-15deg);
        }
        .btn-delete {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 10;
        }
        .btn-delete:hover { background: var(--brand); transform: scale(1.1); transition: 0.3s; }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body class="admin-layout">

    <div class="page-transition-curtain"></div>

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">4U</div>
            <div>
                <div class="sidebar-title">4U Delivery</div>
                <div class="sidebar-subtitle">Admin Panel</div>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="admin_stamps.html" class="sidebar-link inactive ripple-btn">
                <span class="material-symbols-outlined">qr_code_scanner</span>
                إضافة أختام
            </a>
            <a href="admin_users.html" class="sidebar-link inactive ripple-btn">
                <span class="material-symbols-outlined">group</span>
                سجل العملاء
            </a>
            <a href="admin_restaurants.html" class="sidebar-link inactive ripple-btn">
                <span class="material-symbols-outlined">storefront</span>
                إدارة المطاعم
            </a>
            <a href="admin_orders.html" class="sidebar-link inactive ripple-btn">
                <span class="material-symbols-outlined">receipt_long</span>
                إدارة الطلبات
            </a>
            <a href="admin_offers.html" class="sidebar-link active ripple-btn">
                <span class="material-symbols-outlined">local_offer</span>
                إدارة العروض
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <a href="../index.html" class="sidebar-logout ripple-btn">
                <span class="material-symbols-outlined">logout</span>
                خروج
            </a>
        </div>
    </aside>

    <!-- ═══ MAIN DASHBOARD ═══ -->
    <main class="admin-main">
        <div class="admin-container">
            
            <header class="admin-page-header">
                <h1 class="admin-page-title">إدارة عروض النهاردة</h1>
                <p class="admin-page-desc">قم بإضافة وتعديل العروض التي تظهر في الصفحة الرئيسية للعملاء.</p>
            </header>

            <!-- 1. Add Offer Form -->
            <div class="admin-card glass" style="border-color: rgba(200,16,46,0.2);">
                <form id="add-offer-form" class="admin-grid" style="grid-template-columns: 1fr 1fr;">
                    
                    <div class="form-group">
                        <label class="label-text">عنوان العرض</label>
                        <input type="text" id="offer-title" class="input-control" placeholder="مثال: وجبة التوفير من برجر كينج" required />
                    </div>
                    
                    <div class="form-group">
                        <label class="label-text">نص البادج (الشريطة)</label>
                        <input type="text" id="offer-badge" class="input-control" placeholder="مثال: خصم 50% أو عرض خاص" required />
                    </div>

                    <div class="form-group" style="grid-column: span 2;">
                        <label class="label-text">وصف العرض</label>
                        <input type="text" id="offer-desc" class="input-control" placeholder="مثال: ساندوتش دبل شيز + بطاطس + كولا" required />
                    </div>

                    <div class="form-group">
                        <label class="label-text">تصميم ولون العرض</label>
                        <select id="offer-type" class="input-control">
                            <option value="brand">اللون الأحمر الأساسي (Brand)</option>
                            <option value="gold">اللون الأسود والذهبي (Premium)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="label-text">أيقونة الخلفية (اسم من Google Fonts)</label>
                        <input type="text" id="offer-icon" class="input-control" placeholder="مثال: fastfood, local_shipping, star" value="fastfood" required />
                    </div>

                    <div class="form-group" style="grid-column: span 2;">
                        <label class="label-text">رابط العرض (عند الضغط)</label>
                        <input type="text" id="offer-link" class="input-control" placeholder="مثال: ./_4/restaurant.html?id=123 أو ./_4/res.html" value="./_4/res.html" required />
                    </div>

                    <div style="grid-column: span 2; margin-top: 1rem;">
                        <button type="submit" class="btn btn-primary w-100 ripple-btn" id="btn-add-offer">
                            <span class="material-symbols-outlined">add_circle</span>
                            إضافة العرض
                        </button>
                    </div>
                </form>
            </div>

            <!-- 2. Offers List -->
            <h2 class="admin-page-title" style="margin-top: 3rem; font-size: 1.5rem;">العروض الحالية</h2>
            <div id="offers-list" class="offers-list">
                <!-- Offers injected here via JS -->
            </div>
            
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../firebase-config.js"></script>

    <script>
        const db = firebase.firestore();

        // Reveal effect
        window.addEventListener('load', () => {
            setTimeout(() => { document.querySelector('.page-transition-curtain').style.transform = 'translateY(100%)'; }, 100);
            loadOffers();
        });

        // Add Offer
        document.getElementById('add-offer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-add-offer');
            
            const title = document.getElementById('offer-title').value.trim();
            const desc = document.getElementById('offer-desc').value.trim();
            const badge = document.getElementById('offer-badge').value.trim();
            const type = document.getElementById('offer-type').value;
            const icon = document.getElementById('offer-icon').value.trim();
            const link = document.getElementById('offer-link').value.trim();

            if (!title || !desc || !badge) return alert("يرجى ملء كافة الحقول");

            btn.disabled = true;
            btn.innerHTML = '<div class="loader" style="width:20px;height:20px;border-width:2px;margin:auto;"></div>';

            try {
                await db.collection("offers").add({
                    title,
                    desc,
                    badge,
                    type,
                    icon,
                    link,
                    isActive: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("تم إضافة العرض بنجاح!");
                document.getElementById('add-offer-form').reset();
                loadOffers();
            } catch(err) {
                console.error(err);
                alert("حدث خطأ أثناء الإضافة.");
            }

            btn.disabled = false;
            btn.innerHTML = '<span class="material-symbols-outlined">add_circle</span> إضافة العرض';
        });

        // Load Offers
        async function loadOffers() {
            const list = document.getElementById('offers-list');
            list.innerHTML = '<div class="loader" style="margin: 2rem auto;"></div>';

            try {
                const snapshot = await db.collection("offers").get();
                let html = '';
                if (snapshot.empty) {
                    list.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center;">
                        <p style="color:#aaa; margin-bottom:1rem;">لا توجد عروض مضافة حالياً.</p>
                        <button onclick="seedDemoOffers()" class="btn btn-primary ripple-btn" style="background:var(--brand); border:none; padding: 0.5rem 1rem; border-radius: 0.5rem; color:white; font-family:inherit; cursor:pointer;">
                            إضافة العروض التجريبية
                        </button>
                    </div>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const cardClass = data.type === 'gold' ? 'offer-gold' : 'offer-brand';
                    
                    html += `
                    <div class="offer-card ${cardClass}">
                        <button class="btn-delete" onclick="deleteOffer('${doc.id}')" title="حذف العرض">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                        
                        <div style="display:flex; justify-content:space-between; align-items:center; z-index:1;">
                            <span class="offer-badge">${data.badge}</span>
                            <label class="toggle-switch">
                                <input type="checkbox" ${data.isActive ? 'checked' : ''} onchange="toggleActive('${doc.id}', this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                        
                        <h3 class="offer-title" style="z-index:1;">${data.title}</h3>
                        <p class="offer-desc" style="z-index:1;">${data.desc}</p>
                        <div style="font-size: 0.8rem; opacity: 0.7; z-index:1; margin-top:0.5rem; direction:ltr; text-align:right;">
                            🔗 ${data.link}
                        </div>
                        
                        <span class="material-symbols-outlined offer-icon-bg">${data.icon}</span>
                    </div>
                    `;
                });
                list.innerHTML = html;
            } catch(err) {
                console.error(err);
                list.innerHTML = '<p style="color:var(--brand); text-align:center;">حدث خطأ أثناء جلب العروض.</p>';
            }
        }

        // Delete Offer
        window.deleteOffer = async (id) => {
            if(!confirm("هل أنت متأكد من حذف هذا العرض نهائياً؟")) return;
            try {
                await db.collection("offers").doc(id).delete();
                loadOffers();
            } catch(err) {
                alert("خطأ أثناء الحذف");
            }
        }

        // Toggle Active
        window.toggleActive = async (id, isActive) => {
            try {
                await db.collection("offers").doc(id).update({ isActive });
            } catch(err) {
                alert("خطأ أثناء التحديث");
                loadOffers(); // revert UI
            }
        }

        // Seed Demo Offers
        window.seedDemoOffers = async () => {
            const list = document.getElementById('offers-list');
            list.innerHTML = '<div class="loader" style="margin: 2rem auto;"></div>';
            try {
                await db.collection("offers").add({
                    title: "توفير البطوط",
                    desc: "شاورما وكريب من البطوط بأفضل الأسعار",
                    badge: "عرض الصحاب",
                    type: "brand",
                    icon: "fastfood",
                    link: "./_4/res.html",
                    isActive: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection("offers").add({
                    title: "عروض القرموطي",
                    desc: "اطلب مشاوي القرموطي واستمتع بتوصيل سريع",
                    badge: "توصيل مجاني",
                    type: "gold",
                    icon: "local_shipping",
                    link: "./_4/res.html",
                    isActive: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                loadOffers();
            } catch(err) {
                console.error(err);
                alert("خطأ أثناء الإضافة التجريبية");
            }
        }
    </script>
</body>
</html>
