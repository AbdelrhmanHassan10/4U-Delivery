<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>4U Delivery | كارت الأختام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="stamps.css">
</head>
<body class="stamp-card-layout">

    <!-- Page Transition Curtain -->
    <div class="page-transition-curtain"></div>

    <!-- Background Effects -->
    <div class="bg-effects">
        <div class="glow-brand"></div>
        <div class="glow-gold"></div>
    </div>

    <!-- ═══ NAVBAR ═══ -->
    <nav class="stamp-nav glass">
        <div class="stamp-nav-inner">
            <a href="../_4/res.html" class="stamp-nav-back ripple-btn" style="padding: 0.5rem; border-radius: 0.5rem;">
                <span class="material-symbols-outlined">arrow_forward</span>
                <span>الرجوع للمطاعم</span>
            </a>
            <div class="stamp-nav-logo">4U</div>
        </div>
    </nav>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="stamp-main">
        <div class="stamp-container">
            
            <div class="stamp-box glass-strong">
                <!-- Watermark Logo -->
                <div class="watermark" id="brand-watermark">Dots</div>
                
                <!-- Header Links -->
                <div class="stamp-header">
                    <!-- Right (Facebook) -->
                    <a href="../_7/contact.html" class="brand-icon-wrapper ripple-btn" style="border-radius:1rem; padding:0.25rem;">
                        <div class="brand-icon facebook">
                            <svg style="width:24px; height:24px; fill:#1877F2;" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                        </div>
                        <span class="brand-icon-text">Face</span>
                    </a>
                    
                    <!-- Title / Wallet Cards -->
                    <div class="stamp-title-container" style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; flex: 1; min-width: 0; padding: 0 0.5rem;">
                        <img id="brand-logo-img" src="" alt="Logo" class="hidden" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
                        <div id="wallet-cards-container" class="wallet-scroll-container hidden"></div>
                        <h1 class="stamp-title" id="brand-name" style="margin: 0;">Dots</h1>
                    </div>

                    <!-- Left (4U Delivery) -->
                    <a href="../_3/home.html" class="brand-icon-wrapper ripple-btn" style="border-radius:1rem; padding:0.25rem;">
                        <div class="brand-icon delivery">
                            <div class="stamp-nav-logo" style="width:24px; height:24px; font-size:10px;">4U</div>
                        </div>
                        <span class="brand-icon-text">4U Delivery</span>
                    </a>
                </div>

                <!-- Pyramid Stamps Container -->
                <div class="pyramid-container">
                    
                    <!-- Row 1 (4 circles) -->
                    <div class="pyramid-row">
                        <div class="stamp-circle" data-index="1"></div>
                        <div class="stamp-circle" data-index="2"></div>
                        <div class="stamp-circle" data-index="3"></div>
                        <div class="stamp-circle" data-index="4"></div>
                    </div>
                    
                    <!-- Row 2 (3 circles) -->
                    <div class="pyramid-row">
                        <div class="stamp-circle" data-index="5"></div>
                        <div class="stamp-circle" data-index="6"></div>
                        <div class="stamp-circle" data-index="7"></div>
                    </div>
                    
                    <!-- Row 3 (2 circles) -->
                    <div class="pyramid-row">
                        <div class="stamp-circle" data-index="8"></div>
                        <div class="stamp-circle" data-index="9"></div>
                    </div>
                    
                    <!-- Row 4 (1 circle - The Gold Prize) -->
                    <div class="pyramid-row" style="margin-top: 0.5rem;">
                        <div class="stamp-circle golden animate-float" data-index="10"></div>
                    </div>
                </div>

                <!-- Text Instruction -->
                <div class="instruction-text">
                    <p>كمل الـ <span>١٠</span> أختام وخش سحب علي</p>
                    <div class="instruction-divider"></div>
                </div>

                <!-- Rewards Row -->
                <div class="rewards-grid">
                    <div class="reward-box reward-box-dark">
                        <span class="material-symbols-outlined text-gold" style="font-size:24px;">local_offer</span>
                        <span class="reward-text">خصم 50%<br>على الاوردر</span>
                    </div>

                    <div class="reward-box reward-box-brand">
                        <span class="material-symbols-outlined text-brand-light" style="font-size:24px;">local_shipping</span>
                        <span class="reward-text">أوردر<br>Free</span>
                    </div>

                    <div class="reward-box reward-box-dark">
                        <span class="material-symbols-outlined text-gold" style="font-size:24px;">inventory_2</span>
                        <span class="reward-text">بوكس 12<br>قطعة</span>
                    </div>
                </div>
                
            </div>
            
            <p class="stamp-footer-text">يتم إضافة الختم بواسطة إدارة المطعم فقط.</p>
        </div>
    </main>

    <script type="module" src="stamps.js"></script>
</body>
</html>
